name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  node:
    name: Node — typecheck / lint / format / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # `npm install` rather than `npm ci` because the lockfile is generated on
      # darwin-arm64 and would need linux-x64 optional binaries (sharp, swc,
      # @emnapi/*) baked in. `install` resolves the host-platform set without
      # complaining; the lockfile is still authoritative for the touchline
      # source-of-truth deps.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

  vendored-go:
    # Verifies the vendored tree still builds. We deliberately don't run
    # upstream tests here — they're identity-platform-go's CI concern. What
    # matters for touchline is that the vendored snapshot produces a working
    # image. `docker buildx build --check` catches Dockerfile regressions
    # before they hit the e2e job below.
    name: Vendored ${{ matrix.service }} — image build check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity
            build_arg: identity-service
          - service: gateway
            build_arg: api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Build services/${{ matrix.service }} → ${{ matrix.build_arg }}
        # Plain `docker build` (no buildx setup): the CI runner already has
        # docker installed, and buildx's BuildKit + --load combo was failing
        # to see go.work in the build context.
        run: |
          docker build \
            --build-arg SERVICE_NAME=${{ matrix.build_arg }} \
            --tag touchline-${{ matrix.service }}:ci \
            services/${{ matrix.service }}

  # Playwright happy-path removed from CI — was running in ~3 minutes and
  # gating every PR. Run locally before merging anything that touches the
  # auth flow or the live tracker:
  #
  #   docker compose up -d --build
  #   npx playwright install chromium   # first run only
  #   npm run test:e2e
  #
  # See README "End-to-end test" section.
