name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  node:
    name: Node — typecheck / lint / format / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # `npm install` rather than `npm ci` because the lockfile is generated on
      # darwin-arm64 and would need linux-x64 optional binaries (sharp, swc,
      # @emnapi/*) baked in. `install` resolves the host-platform set without
      # complaining; the lockfile is still authoritative for the touchline
      # source-of-truth deps.
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

  go-services:
    # Verifies every Go service image still builds. For the vendored services
    # (identity, gateway) we deliberately don't run upstream tests — that's
    # identity-platform-go's CI concern. match-engine is authored here, so
    # its unit tests run inside the build via go test. What matters for
    # touchline is that each service produces a working image.
    name: Go service ${{ matrix.service }} — image build check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity
            build_args: --build-arg SERVICE_NAME=identity-service
          - service: gateway
            build_args: --build-arg SERVICE_NAME=api-gateway
          - service: match-engine
            build_args: ''
    steps:
      - uses: actions/checkout@v4
      - name: Build services/${{ matrix.service }}
        # Plain `docker build` (no buildx setup): the CI runner already has
        # docker installed, and buildx's BuildKit + --load combo was failing
        # to see go.work in the build context.
        run: |
          docker build \
            ${{ matrix.build_args }} \
            --tag touchline-${{ matrix.service }}:ci \
            services/${{ matrix.service }}

  # Playwright happy-path removed from CI — was running in ~3 minutes and
  # gating every PR. Run locally before merging anything that touches the
  # auth flow or the live tracker:
  #
  #   docker compose up -d --build
  #   npx playwright install chromium   # first run only
  #   npm run test:e2e
  #
  # See README "End-to-end test" section.
