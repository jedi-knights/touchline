name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  node:
    name: Node — typecheck / lint / format / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

  vendored-go:
    # Verifies the vendored tree still builds. We deliberately don't run
    # upstream tests here — they're identity-platform-go's CI concern. What
    # matters for touchline is that the vendored snapshot produces a working
    # image. `docker buildx build --check` catches Dockerfile regressions
    # before they hit the e2e job below.
    name: Vendored ${{ matrix.service }} — image build check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity
            build_arg: identity-service
          - service: gateway
            build_arg: api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build services/${{ matrix.service }} → ${{ matrix.build_arg }}
        run: |
          docker buildx build \
            --build-arg SERVICE_NAME=${{ matrix.build_arg }} \
            --tag touchline-${{ matrix.service }}:ci \
            --load \
            services/${{ matrix.service }}

  e2e:
    name: Playwright happy-path (full stack)
    runs-on: ubuntu-latest
    needs: [node]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate .env
        run: |
          cp .env.example .env
          SECRET=$(openssl rand -base64 32)
          sed -i "s|AUTH_SECRET=replace-me-with-openssl-rand-base64-32|AUTH_SECRET=$SECRET|" .env
      - name: Bring up the stack
        run: docker compose up -d --build --wait
        timeout-minutes: 10
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Run happy-path
        run: npm run test:e2e
      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace
          path: test-results/
          if-no-files-found: ignore
