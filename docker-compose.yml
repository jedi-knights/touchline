# Touchline local stack.
#
# Request path:  browser → gateway:8080 → app:3000 (internal)
#                                       → server actions call identity-service:8081 (internal)
#
# Long-running services:
#   - postgres:         shared by touchline and identity-service (separate DBs)
#   - identity-service: credential validation for the Next.js app
#   - app:              the Next.js app itself (internal-only; reached via gateway)
#   - gateway:          api-gateway front-door — rate limit + compression
#
# Adminer is opt-in via the `tools` profile:
#   docker compose --profile tools up

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-touchline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-touchline}
      POSTGRES_DB: ${POSTGRES_DB:-touchline}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  identity-service:
    build:
      context: ./services/identity
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: identity-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      IDENTITY_DATABASE_URL: postgres://${POSTGRES_USER:-touchline}:${POSTGRES_PASSWORD:-touchline}@postgres:5432/identity_service?sslmode=disable
      IDENTITY_SERVER_HOST: 0.0.0.0
      IDENTITY_SERVER_PORT: 8081
      IDENTITY_LOG_LEVEL: ${IDENTITY_LOG_LEVEL:-info}
      IDENTITY_LOG_FORMAT: json
      IDENTITY_LOG_ENVIRONMENT: ${IDENTITY_LOG_ENVIRONMENT:-development}
    # No host port mapping — only the Next.js app calls in over the docker
    # network. Browsers should never reach this service directly.
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:8081/health']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  match-engine:
    build:
      context: ./services/match-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MATCH_ENGINE_DATABASE_URL: postgres://${POSTGRES_USER:-touchline}:${POSTGRES_PASSWORD:-touchline}@postgres:5432/${POSTGRES_DB:-touchline}
      MATCH_ENGINE_SERVER_HOST: 0.0.0.0
      MATCH_ENGINE_SERVER_PORT: 8082
      MATCH_ENGINE_LOG_LEVEL: ${MATCH_ENGINE_LOG_LEVEL:-info}
    # /ready (not /health) is what gates `depends_on: service_healthy`.
    # /ready pings the DB pool and answers 503 while the service is draining,
    # which means the app container won't start until match-engine can
    # actually round-trip to postgres — not just "the binary started."
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:8082/ready']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      match-engine:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-touchline}:${POSTGRES_PASSWORD:-touchline}@postgres:5432/${POSTGRES_DB:-touchline}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      MATCH_ENGINE_URL: http://match-engine:8082
      AUTH_SECRET: ${AUTH_SECRET:-please-change-me-in-env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      # Trust the gateway as the only X-Forwarded-* source. Auth.js v5 reads
      # this to detect the public origin when behind the proxy.
      AUTH_TRUST_HOST: 'true'
      # Opt-in demo data. When true, the entrypoint provisions the
      # demo@touchline.local account and seeds 6 teams and 10 finished
      # matches after migrations. Idempotent.
      SEED_DEMO: ${SEED_DEMO:-false}
    # No host port mapping — clients reach the app via the gateway.
    healthcheck:
      test: ['CMD', 'curl', '--fail', '--silent', 'http://127.0.0.1:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    # The image's ENTRYPOINT is the binary; the `serve` subcommand starts
    # the HTTP server. Without it the binary prints help and exits.
    command: ['serve']
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      GATEWAY_LOG_LEVEL: ${GATEWAY_LOG_LEVEL:-info}
      GATEWAY_LOG_ENVIRONMENT: ${GATEWAY_LOG_ENVIRONMENT:-development}
    working_dir: /app
    volumes:
      # Mount the touchline-tuned config read-only at the binary's working
      # directory. The gateway searches ./gateway.yaml first.
      - ./init/gateway/gateway.yaml:/app/gateway.yaml:ro
    ports:
      - '${APP_PORT:-3000}:8080'
    healthcheck:
      # /ready is the local-state-only probe — passes once the proxy chain
      # is wired up. /health does upstream aggregation which would return
      # 503 against touchline's "/" because the unauthenticated root path
      # returns a 307 to /sign-in, not a 200 OK. The Next.js app's own
      # /api/health is the real per-upstream gate (and `app` already
      # depends on it).
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:8080/ready']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  adminer:
    image: adminer:4
    profiles: ['tools']
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${ADMINER_PORT:-8080}:8080'

volumes:
  postgres_data:
