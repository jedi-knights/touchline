# Touchline local stack.
#
# Three long-running services:
#   - postgres:         shared by touchline and identity-service (separate DBs)
#   - identity-service: credential validation for the Next.js app
#   - app:              the Next.js app itself
#
# Adminer is opt-in via the `tools` profile:
#   docker compose --profile tools up

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-touchline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-touchline}
      POSTGRES_DB: ${POSTGRES_DB:-touchline}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts run only on first start (empty data dir). They create
      # the identity_service database alongside the default touchline one.
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  identity-service:
    build:
      context: ./services/identity
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: identity-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      IDENTITY_DATABASE_URL: postgres://${POSTGRES_USER:-touchline}:${POSTGRES_PASSWORD:-touchline}@postgres:5432/identity_service?sslmode=disable
      IDENTITY_SERVER_HOST: 0.0.0.0
      IDENTITY_SERVER_PORT: 8081
      IDENTITY_LOG_LEVEL: ${IDENTITY_LOG_LEVEL:-info}
      IDENTITY_LOG_FORMAT: json
      IDENTITY_LOG_ENVIRONMENT: ${IDENTITY_LOG_ENVIRONMENT:-development}
    ports:
      # Bind to the host on a non-default port so it doesn't collide with a
      # local Go service. Internal cluster talks to it via the service name.
      - '${IDENTITY_PORT:-8081}:8081'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:8081/health']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-touchline}:${POSTGRES_PASSWORD:-touchline}@postgres:5432/${POSTGRES_DB:-touchline}
      IDENTITY_SERVICE_URL: http://identity-service:8081
      AUTH_SECRET: ${AUTH_SECRET:-please-change-me-in-env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    ports:
      - '${APP_PORT:-3000}:3000'
    healthcheck:
      test: ['CMD', 'curl', '--fail', '--silent', 'http://127.0.0.1:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  adminer:
    image: adminer:4
    profiles: ['tools']
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${ADMINER_PORT:-8080}:8080'

volumes:
  postgres_data:
